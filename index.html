<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" sizes="any" href="%BASE_URL%branding.svg?v=1" />
    <link rel="shortcut icon" type="image/svg+xml" href="%BASE_URL%branding.svg?v=1" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>72X</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/javascript">
      (function (l) {
        if (l.search && l.search[1] === '/') {
          var decoded = l.search
            .slice(1)
            .split('&')
            .map(function (s) {
              return s.replace(/~and~/g, '&');
            })
            .join('?');
          var basePath = (l.pathname || '/').replace(/\/+$/, '');
          var nextPath = String(decoded || '').replace(/^\/+/, '');
          window.history.replaceState(null, null, (basePath ? basePath : '') + '/' + nextPath + l.hash);
        }
      })(window.location);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
