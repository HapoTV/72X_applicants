# .github/workflows/gh-pages.yml
 
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the master branch
  push:
    branches: ["master"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    environment: production  # target the Production environment
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build
        run: npm run build
        env:
          CI: false
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PRODUCTION_URL: ${{ secrets.VITE_PRODUCTION_URL }}
      
      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/404.html
          if grep -q "%BASE_URL%" dist/index.html; then
            echo "ERROR: dist/index.html still contains %BASE_URL% placeholders (not built output)"
            exit 1
          fi
          if grep -q "/src/" dist/index.html; then
            echo "ERROR: dist/index.html references /src/* (not built output)"
            exit 1
          fi
          if ! grep -q "/assets/" dist/index.html; then
            echo "ERROR: dist/index.html does not reference /assets/* (unexpected build output)"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload dist directory
          path: './dist'
  
  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4