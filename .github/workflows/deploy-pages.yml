name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/index.html
          test -f dist/404.html
          if grep -q "%BASE_URL%" dist/index.html; then
            echo "ERROR: dist/index.html still contains %BASE_URL% placeholders (not built output)"
            exit 1
          fi
          if grep -q "/src/" dist/index.html; then
            echo "ERROR: dist/index.html references /src/* (not built output)"
            exit 1
          fi
          if ! grep -q "/assets/" dist/index.html; then
            echo "ERROR: dist/index.html does not reference /assets/* (unexpected build output)"
            exit 1
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
